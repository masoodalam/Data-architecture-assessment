<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Architecture Maturity Assessment</title>
  <meta name="description" content="A free, open-source tool for assessing your organisation's data architecture maturity against the DAMA-DMBOK framework." />

  <!-- Tailwind CSS via CDN — no build step required -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="assets/styles.css" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex items-center justify-center">

  <main class="text-center px-6 py-12 max-w-xl">

    <!-- Saltire logo -->
    <div class="flex justify-center mb-6" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 40" width="90" height="60"
           role="img" aria-label="Flag of Scotland">
        <title>Flag of Scotland (Saltire)</title>
        <rect width="60" height="40" fill="#0065BD" rx="3"/>
        <line x1="0" y1="0" x2="60" y2="40" stroke="white" stroke-width="8"/>
        <line x1="60" y1="0" x2="0" y2="40" stroke="white" stroke-width="8"/>
      </svg>
    </div>

    <h1 class="text-2xl font-bold text-gray-900 mb-2">
      Data Architecture Maturity Assessment
    </h1>
    <p class="text-gray-500 mb-8">Coming soon — full tool under construction.</p>

    <p class="text-sm text-gray-400">
      Open source · Client-side only · No data leaves your browser
    </p>
  </main>

</body>
</html>
