<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diagnostic — Data Architecture Assessment</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #0f172a; color: #e2e8f0; margin: 0; }
    h1 { color: #38bdf8; font-size: 18px; margin-bottom: 4px; }
    p.sub { color: #64748b; font-size: 13px; margin: 0 0 20px; }
    .card { background: #1e293b; border-radius: 8px; padding: 16px; margin-bottom: 12px; border-left: 4px solid #334155; }
    .card.pass  { border-color: #22c55e; }
    .card.fail  { border-color: #ef4444; }
    .card.warn  { border-color: #f59e0b; }
    .card.info  { border-color: #38bdf8; }
    .label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .pass  .label { color: #22c55e; }
    .fail  .label { color: #ef4444; }
    .warn  .label { color: #f59e0b; }
    .info  .label { color: #38bdf8; }
    .value { font-size: 13px; color: #cbd5e1; word-break: break-all; }
    .err   { color: #fca5a5; font-size: 13px; margin-top: 4px; }
    #log   { margin-top: 8px; }
    .log-entry { font-size: 12px; color: #94a3b8; padding: 2px 0; border-bottom: 1px solid #1e293b; }
    .log-entry.error { color: #f87171; }
    .log-entry.warn  { color: #fbbf24; }
  </style>
</head>
<body>

<h1>Diagnostic — Data Architecture Assessment</h1>
<p class="sub">Runs on load. Every test result is shown below.</p>

<div id="results"></div>

<script>
  const results = document.getElementById('results');
  const log = [];

  // Intercept console.error / console.warn
  const _error = console.error.bind(console);
  const _warn  = console.warn.bind(console);
  console.error = (...a) => { log.push({type:'error', msg: a.join(' ')}); _error(...a); };
  console.warn  = (...a) => { log.push({type:'warn',  msg: a.join(' ')}); _warn(...a);  };
  window.onerror = (msg, src, line, col, err) => {
    log.push({type:'error', msg: `${msg}\n  at ${src}:${line}:${col}`});
  };
  window.onunhandledrejection = (e) => {
    log.push({type:'error', msg: `Unhandled promise rejection: ${e.reason}`});
  };

  function card(status, label, value, extra) {
    const d = document.createElement('div');
    d.className = `card ${status}`;
    d.innerHTML = `<div class="label">${label}</div><div class="value">${value}</div>`
      + (extra ? `<div class="err">${extra}</div>` : '');
    results.appendChild(d);
  }

  // 1 — Environment
  card('info', 'URL', location.href);
  card('info', 'Protocol', location.protocol);
  card('info', 'Browser', navigator.userAgent);

  // 2 — localStorage
  try {
    localStorage.setItem('_diag', '1');
    localStorage.removeItem('_diag');
    card('pass', 'localStorage', 'read/write OK');
  } catch(e) {
    card('fail', 'localStorage', 'FAILED', e.message);
  }

  // 3 — ES module support
  const supportsModules = 'noModule' in HTMLScriptElement.prototype;
  card(supportsModules ? 'pass' : 'fail', 'ES Modules', supportsModules ? 'Supported' : 'NOT SUPPORTED — browser too old');

  // 4 — fetch API
  card(typeof fetch === 'function' ? 'pass' : 'fail', 'fetch API',
    typeof fetch === 'function' ? 'Available' : 'NOT AVAILABLE');
</script>

<!-- 5 — Test each module import -->
<script type="module">
  const R = document.getElementById('results');
  function card(status, label, value, extra) {
    const d = document.createElement('div');
    d.className = `card ${status}`;
    d.innerHTML = `<div class="label">${label}</div><div class="value">${value}</div>`
      + (extra ? `<div class="err">${extra}</div>` : '');
    R.appendChild(d);
  }

  const modules = [
    './js/content/dimensions.js',
    './js/content/maturity-levels.js',
    './js/content/context-questions.js',
    './js/content/questions.js',
    './js/content/recommendations.js',
    './js/content/tools-catalogue.js',
    './js/content/narrative-snippets.js',
    './js/state.js',
    './js/scoring.js',
    './js/recommendations.js',
    './js/narrative.js',
    './js/chart.js',
    './js/report.js',
    './js/app.js',
  ];

  for (const mod of modules) {
    try {
      const m = await import(mod);
      const keys = Object.keys(m).join(', ');
      card('pass', `import ${mod}`, `OK — exports: ${keys}`);
    } catch(e) {
      card('fail', `import ${mod}`, 'FAILED', e.message + (e.stack ? '\n' + e.stack.split('\n').slice(0,3).join('\n') : ''));
    }
  }

  // 6 — Try calling loadContent
  try {
    const { loadContent } = await import('./js/state.js');
    const content = await loadContent();
    const summary = Object.entries(content).map(([k,v]) => `${k}:${Array.isArray(v)?v.length:'obj'}`).join(', ');
    card('pass', 'loadContent()', summary);
  } catch(e) {
    card('fail', 'loadContent()', 'THREW AN ERROR', e.message);
  }

  // 7 — Show intercepted console log
  const logDiv = document.createElement('div');
  logDiv.className = 'card info';
  logDiv.innerHTML = '<div class="label">Console log (errors &amp; warnings)</div><div id="log"></div>';
  R.appendChild(logDiv);
  const logEl = logDiv.querySelector('#log');
  if (window.log.length === 0) {
    logEl.innerHTML = '<div class="log-entry">No errors or warnings captured.</div>';
  } else {
    window.log.forEach(e => {
      const d = document.createElement('div');
      d.className = `log-entry ${e.type}`;
      d.textContent = `[${e.type.toUpperCase()}] ${e.msg}`;
      logEl.appendChild(d);
    });
  }
</script>

</body>
</html>
